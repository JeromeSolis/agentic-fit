name: Deploy showcase site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/build_site_data.py"
      - "tasks/**"
      - "results/crosslab_reps3_2026-05-25.jsonl"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# The official Pages actions still ship on Node 20 (no Node 24 major yet); this
# opts every JavaScript action into the Node 24 runtime ahead of the June 2026
# forced cutover. Drop it once the actions publish Node 24 releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependency
        run: pip install pyyaml
      - name: Regenerate data.json from the published dataset
        run: python scripts/build_site_data.py --out site/data.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
